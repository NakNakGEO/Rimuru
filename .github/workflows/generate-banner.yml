name: Generate animated profile banner

on:
  push:
    paths:
      - "scripts/generate_banner.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow
        run: python -m pip install --upgrade pillow

      - name: Generate animated banner
        run: python scripts/generate_banner.py

      - name: Commit generated GIF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/header_irontech.gif
          if git diff --cached --quiet; then
            echo "Banner is already up to date."
          else
            git commit -m "Generate animated profile banner [skip ci]"
            git push
          fi
